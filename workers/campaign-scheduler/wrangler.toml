name = "eh-system1-campaign-scheduler"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Run every 5 minutes. Adjust as needed.
[triggers]
crons = ["*/5 * * * *"]

