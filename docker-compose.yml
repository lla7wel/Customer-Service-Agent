# English Home Libya platform — the whole system on one VPS.
#   cp .env.example .env   (fill in values)
#   docker compose up -d
#
# Services: postgres (data), app (Next.js web/API), worker (durable jobs:
# AI turns, outbox delivery, publishing, comments, promotions, analytics),
# caddy (TLS + public media). No host cron is required — the worker
# self-schedules recurring work.
x-app-env: &app-env
  DATABASE_URL: postgres://${POSTGRES_USER:-eh}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-eh_system}
  MEDIA_ROOT: /srv/eh-media
  PUBLIC_MEDIA_BASE_URL: ${PUBLIC_MEDIA_BASE_URL:?e.g. https://media.example.com}
  APP_BASE_URL: ${APP_BASE_URL:?e.g. https://app.example.com}
  SESSION_SECRET: ${SESSION_SECRET:?openssl rand -hex 32}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-2.5-flash}
  GEMINI_ROUTER_MODEL: ${GEMINI_ROUTER_MODEL:-gemini-2.5-flash-lite}
  GEMINI_VISION_MODEL: ${GEMINI_VISION_MODEL:-gemini-2.5-flash}
  GEMINI_CREATIVE_VERIFICATION_MODEL: ${GEMINI_CREATIVE_VERIFICATION_MODEL:-gemini-2.5-pro}
  GEMINI_CAMPAIGN_IMAGE_MODEL: ${GEMINI_CAMPAIGN_IMAGE_MODEL:-gemini-3-pro-image}
  GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-3-pro-image}
  GEMINI_IMAGE_FALLBACK_MODEL: ${GEMINI_IMAGE_FALLBACK_MODEL:-gemini-3.1-flash-image-preview}
  GEMINI_IMAGE_LAST_FALLBACK_MODEL: ${GEMINI_IMAGE_LAST_FALLBACK_MODEL:-gemini-2.5-flash-image}
  GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
  META_PAGE_ID: ${META_PAGE_ID:-}
  META_PAGE_ACCESS_TOKEN: ${META_PAGE_ACCESS_TOKEN:-}
  META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-}
  META_APP_SECRET: ${META_APP_SECRET:-}
  META_IG_USER_ID: ${META_IG_USER_ID:-}
  ENABLE_MESSAGE_BATCHING: ${ENABLE_MESSAGE_BATCHING:-true}
  MESSAGE_BATCH_WINDOW_MS: ${MESSAGE_BATCH_WINDOW_MS:-5000}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eh_system}
      POSTGRES_USER: ${POSTGRES_USER:-eh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-eh} -d ${POSTGRES_DB:-eh_system}']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-env
    volumes:
      - media:/srv/eh-media
    expose:
      - '3000'

  worker:
    build: .
    restart: unless-stopped
    command: ['node', 'worker/dist/worker.cjs']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-env
    volumes:
      - media:/srv/eh-media

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?e.g. app.example.com}
      MEDIA_DOMAIN: ${MEDIA_DOMAIN:?e.g. media.example.com}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - media:/srv/eh-media:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  media:
  caddy_data:
  caddy_config:
