name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Tests create their own throwaway databases from this admin connection.
  TEST_DATABASE_ADMIN_URL: postgres://postgres:postgres@localhost:5432/postgres

jobs:
  quality:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix admin-app
          npm ci --prefix scripts

      - name: Lint (admin app)
        run: npm run lint --prefix admin-app

      - name: Typecheck (admin app + integrations)
        run: npm run typecheck --prefix admin-app

      - name: Typecheck (scripts)
        run: npm run typecheck --prefix scripts

      - name: Production build
        run: npm run build --prefix admin-app

      - name: Bundle worker
        run: npm run worker:build

  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix admin-app

      - name: Run tests
        run: npm run test

  e2e:
    name: Browser tests (desktop + phone)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix admin-app

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            tests/e2e/**/*-linux.png
          retention-days: 7

  security:
    name: Dependency audit + secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix admin-app

      # Runtime dependencies must carry no HIGH/CRITICAL advisory.
      - name: Audit runtime dependencies
        run: |
          npm audit --omit=dev --audit-level=high
          npm audit --omit=dev --audit-level=high --prefix admin-app

      - name: Scan for committed secrets
        run: ./scripts/scan-secrets.sh
